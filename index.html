<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a0e10">
  <title>Boxing Universe — God Mode</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <button id="menu-btn" class="menu-btn" aria-label="Menu"><span></span><span></span><span></span></button>
    <button class="brand" data-link="dashboard">
      <span class="brand__mark">★</span><span class="brand__txt">Boxing Universe</span>
    </button>
    <div class="topbar__right">
      <span id="tb-date" class="topbar__date mono">—</span>
      <select id="tb-speed" class="topbar__speed" aria-label="Simulation speed">
        <option value="manual">Manual</option>
        <option value="slow">Slow</option>
        <option value="fast">Fast</option>
        <option value="instant">Instant</option>
      </select>
    </div>
  </header>

  <div id="drawer-scrim"></div>
  <nav class="drawer" aria-label="Main navigation">
    <div class="drawer__inner">
      <div class="nav-group">
        <a class="navlink" data-link="dashboard">Dashboard</a>
        <a class="navlink" data-link="create">Create fighter</a>
        <a class="navlink" data-link="database">Boxer database</a>
        <a class="navlink" data-link="book">Book a fight</a>
        <a class="navlink" data-link="cards">Fight cards</a>
        <a class="navlink" data-link="time">Simulate time</a>
      </div>
      <div class="nav-label">Rankings</div>
      <div class="nav-group">
        <a class="navlink" data-link="leaderboards">Leaderboards</a>
        <a class="navlink" data-link="champions">Champions</a>
        <a class="navlink" data-link="social">Social media</a>
      </div>
      <div class="nav-label">Records</div>
      <div class="nav-group">
        <a class="navlink" data-link="results">Results</a>
        <a class="navlink" data-link="history">History</a>
        <a class="navlink" data-link="awards">Awards</a>
        <a class="navlink" data-link="archive">Archive</a>
      </div>
      <div class="nav-label">System</div>
      <div class="nav-group">
        <a class="navlink" data-link="editor">Database tools</a>
        <a class="navlink" data-link="save">Save &amp; load</a>
      </div>
      <div class="drawer__foot muted">You are the commissioner. Nothing happens unless you make it happen.</div>
    </div>
  </nav>

  <main id="app-content"></main>

  <script src="database.js"></script>
  <script src="engine.js"></script>
  <script src="fightEngine.js"></script>
  <script src="rankings.js"></script>
  <script src="save.js"></script>
  <script src="ui.js"></script>
  <script src="app.js"></script>
</body>
</html>
